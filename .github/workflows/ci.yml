name: CI

on:
  push:
    branches:
      - dev
      - main
      - v3
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: swimclub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d swimclub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/swimclub_test?schema=public
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/swimclub_test?schema=public
      JWT_SECRET: ci-only-jwt-secret
      WEBHOOK_SECRET: ci-only-webhook-secret

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Typecheck scripts
        run: npm run typecheck:scripts
